name: Get Session String
on: workflow_dispatch
jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Install Pyrogram
        run: pip install pyrogram tgcrypto
      - name: Start Generating
        env:
          API_ID: ${{ secrets.TELEGRAM_API_ID }}
          API_HASH: ${{ secrets.TELEGRAM_API_HASH }}
          PHONE: ${{ secrets.TELEGRAM_PHONE_NUMBER }}
        run: |
          python -c "
          import os
          from pyrogram import Client
          async def run():
              async with Client(':memory:', int(os.getenv('API_ID')), os.getenv('API_HASH')) as app:
                  print(await app.export_session_string())
          import asyncio
          try:
              asyncio.run(run())
          except Exception as e:
              print(f'خطأ: {e}')
          "
